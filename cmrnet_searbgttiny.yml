task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]
num_classes: 7

# ==================== Dataset Configuration ====================
train_dataloader: 
  type: DataLoader
  dataset: 
    type: DualModalityCocoDetection
    img_folder_rgb: ./datasets/SeaRGBT-Tiny/images/train/RGB
    img_folder_ir: ./datasets/SeaRGBT-Tiny/images/train/IR
    ann_file: ./datasets/SeaRGBT-Tiny/annotations/train.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - {type: Mosaic, output_size: 320, rotation_range: 10, translation_range: [0.1, 0.1], scaling_range: [0.5, 1.5], probability: 1.0, fill_value: 0, use_cache: False, max_cached_images: 50, random_pop: True}
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640]}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
  shuffle: True
  num_workers: 4
  drop_last: True
  pin_memory: True
  collate_fn:
    type: BatchImageCollateFunction

val_dataloader:
  type: DataLoader
  dataset: 
    type: DualModalityCocoDetection
    # img_folder_rgb: ./datasets/SeaRGBT-Tiny/images/test/RGB
    img_folder_rgb: ./datasets/SeaRGBT-Tiny/images/val/RGB
    # img_folder_ir: ./datasets/SeaRGBT-Tiny/images/test/IR
    img_folder_ir: ./datasets/SeaRGBT-Tiny/images/val/IR
    # ann_file: ./datasets/SeaRGBT-Tiny/annotations/test.json
    ann_file: ./datasets/SeaRGBT-Tiny/annotations/val.json
    return_masks: False
    transforms:
      type: Compose
  shuffle: False
  num_workers: 4
  drop_last: False
  pin_memory: True
  collate_fn:
    type: BatchImageCollateFunction

# ==================== Categories & Core Settings ====================
class_names: ['bus', 'car', 'cyclist', 'drone', 'pedestrian', 'plane', 'ship']

__include__: [
  '../base/deim.yml'
]

output_dir: ./outputs/CMRNet_SeaRGBT-Tiny
model: CMRNet

optimizer:
  type: AdamW
  params:
    - params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.0004
    - params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.0004
      weight_decay: 0.
    - params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.
  lr: 0.0008
  betas: [0.9, 0.999]
  weight_decay: 0.0001

epoches: 160
flat_epoch: 78    
no_aug_epoch: 12
lr_gamma: 1.0

# ==================== CMRNet Architecture (Redacted for Blind Review) ====================
# Note: Exact channel dimensions, routing indices, and node hyperparameters 
# are masked with [*args] and [src] to protect intellectual property prior to publication.

backbone:
  - [prev, IdentityInput, []]                                         
  - [src, ModalitySelector, [1]]                                      
  - [src, ModalitySelector, [2]]                                      

  - [src, StemBlock, [*args]]                                         
  - [src, StemBlock, [*args]]                                         

  - [src, HG_Stage, [*args]]                                          
  - [src, HG_Stage, [*args]]                                          

  - [src, MCDF, [*args]]                                              # Fused_P2

  - [src, HG_Stage, [*args]]                                          
  - [src, HG_Stage, [*args]]                                          
  
  - [src, SCDown, [*args]]                                            

  - [src, MCDF, [*args]]                                              # Fused_P3
  - [src, Concat, []]                                                 
  - [src, ConvNormLayer_fuse, [*args]]                                

  - [src, HG_Stage, [*args]]                                          
  - [src, HG_Stage, [*args]]                                          

encoder:
  - [src, ConvNormLayer_fuse, [*args]]                                
  - [src, ConvNormLayer_fuse, [*args]]                                
  - [src, ConvNormLayer_fuse, [*args]]                                

  - [src, TransformerEncoderBlock, [*args]]                           
  - [src, ConvNormLayer_fuse, [*args]]                                
  - [src, nn.Upsample, [*args]]                                       
  - [src, Concat, []]                                                 
  - [src, RepNCSPELAN4, [*args]]                                      

  - [src, ConvNormLayer_fuse, [*args]]                                
  - [src, nn.Upsample, [*args]]                                       
  - [src, Concat, []]                                                 
  - [src, RepNCSPELAN4, [*args]]                                      

  - [src, SCDown, [*args]]                                            
  - [src, Concat, []]                                                 
  - [src, PolyBlock, [*args]]                                         # PolyBlock on P4

  - [src, SCDown, [*args]]                                            
  - [src, Concat, []]                                                 
  - [src, PolyBlock, [*args]]                                         # PolyBlock on P5

decoder:
  - [src, DGQS_Transformer, {"using_densitymap_iter": 10000, "hyperparams": "**kwargs_withheld"}]
